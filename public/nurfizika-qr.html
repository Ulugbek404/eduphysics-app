<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NurFizika QR Code</title>
<style>
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f8fafc;
    font-family: Arial, sans-serif;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    max-width: 320px;
  }
  .logo { font-size: 32px; margin-bottom: 8px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #1e1b4b; }
  p { margin: 0 0 20px; color: #6366f1; font-size: 13px; }
  #qrcode { margin: 0 auto 20px; display: inline-block; }
  .url { font-size: 12px; color: #64748b; margin: 12px 0 20px; }
  .btn {
    display: inline-block;
    padding: 10px 24px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    text-decoration: none;
  }
  .btn:hover { background: #4f46e5; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡</div>
  <h1>NurFizika</h1>
  <p>Kuch — bilimda!</p>
  <div id="qrcode"></div>
  <div class="url">eduphysics-app.web.app</div>
  <button class="btn" onclick="downloadPNG()">PNG yuklash</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
new QRCode(document.getElementById("qrcode"), {
  text: "https://eduphysics-app.web.app",
  width: 200,
  height: 200,
  colorDark: "#1e1b4b",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});

function downloadPNG() {
  setTimeout(() => {
    const canvas = document.querySelector("#qrcode canvas");
    if (!canvas) { alert("Qayta urinib ko'ring"); return; }
    const a = document.createElement('a');
    a.download = 'nurfizika-qr.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }, 500);
}
</script>
</body>
</html>
